<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイ・ミニアプリ</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            padding-top: 50px;
        }

        .btn {
            background: #06C755;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h1>ようこそ！</h1>
    <p>これはGitHub Pagesで動いているLPです。</p>
    <div id="user-info">読み込み中...</div>
    <br>
    <button class="btn" onclick="liff.closeWindow()">アプリを閉じる</button>

    <script>
        async function main() {
            try {
                // 1. LIFFの初期化
                await liff.init({ liffId: "2009381485-5UhSxIgv" });

                // 2. ログイン状態の確認
                if (!liff.isLoggedIn()) {
                    // ログインしていない場合はログイン画面へ（ミニアプリの場合は自動で走りますが念のため）
                    liff.login();
                    return;
                }

                // 3. プロフィールの取得
                const profile = await liff.getProfile();

                // 4. 画面への表示
                const userInfoElement = document.getElementById("user-info");
                if (profile && profile.displayName) {
                    userInfoElement.innerText = "こんにちは、" + profile.displayName + "さん！";
                } else {
                    userInfoElement.innerText = "プロフィール情報を取得できませんでした。";
                }

            } catch (err) {
                console.error('LIFF初期化失敗:', err);
                document.getElementById("user-info").innerText = "エラーが発生しました: " + err.message;
            }
        }
        main();
    </script>
</body>

</html>
