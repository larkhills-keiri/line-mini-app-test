<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイ・ミニアプリ</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            padding-top: 50px;
        }

        .btn {
            background: #06C755;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <h1>ようこそ！</h1>
    <p>これはGitHub Pagesで動いているLPです。</p>
    <div id="user-info">読み込み中...</div>
    <br>
    <button class="btn" onclick="liff.closeWindow()">アプリを閉じる</button>

    <script>
        async function main() {
            await liff.init({ liffId: "2009381481-5IWU15kU" });
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                document.getElementById("user-info").innerText = "こんにちは、" + profile.displayName + "さん！";
            } else {
                liff.login();
            }
        }
        main();
    </script>
</body>

</html>
